<div>
  <div class="container-central">
    <div class="imagem">
      <img src="/img/ranger.png" alt="Ford Ranger">
    </div>

    <form class="formulario" (ngSubmit)="aoEnviarFormulario()">
      <img src="/img/ford.png" alt="Ford">

      <h1 class="titulo">Boas-vindas</h1>

      <div class="mb-3 position-relative">
        <input type="text" class="form-control" id="email" name="nome" [(ngModel)]="dadosLogin.nome"
          placeholder="Insira seu usuario" required>

        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
          class="bi bi-person position-absolute" style="left: 10px; top: 50%; transform: translateY(-50%); z-index: 10;"
          viewBox="0 0 16 16">
          <path
            d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z" />
        </svg>
      </div>

      <div class="mb-3 position-relative">
        <input type="password" class="form-control" id="senha" name="senha" [(ngModel)]="dadosLogin.senha"
          placeholder="Insira sua senha" required>

        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
          class="bi bi-lock position-absolute" style="left: 10px; top: 50%; transform: translateY(-50%);"
          viewBox="0 0 16 16">
          <path fill-rule="evenodd"
            d="M8 0a4 4 0 0 1 4 4v2.05a2.5 2.5 0 0 1 2 2.45v5a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 2 13.5v-5a2.5 2.5 0 0 1 2-2.45V4a4 4 0 0 1 4-4M4.5 7A1.5 1.5 0 0 0 3 8.5v5A1.5 1.5 0 0 0 4.5 15h7a1.5 1.5 0 0 0 1.5-1.5v-5A1.5 1.5 0 0 0 11.5 7zM8 1a3 3 0 0 0-3 3v2h6V4a3 3 0 0 0-3-3" />
        </svg>
      </div>

      <button type="submit" class="btn btn-primary">
        Entrar
      </button>
    </form>
  </div>
</div>
